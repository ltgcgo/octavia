<!DOCTYPE html>
<head>
	<meta http-equiv="200" charset="utf-8" />
	<title>File structure viewing</title>
	<meta content="true" name="HandheldFriendly" />
	<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" name="viewport" />
	<link rel="stylesheet" href="../css/water.min.css" />
	<link rel="stylesheet" href="../css/fonts.css" />
	<style>select{display:unset !important}</style>
</head>
<body>
	<p>
		<select name="file-type" id="loaderType">
			<option value="auto">Auto</option>
			<option value="smf">SMF-like</option>
			<option value="seam-vlv">SEAM (VLV-8)</option>
			<option value="seam-rvlv">SEAM (RVLV-8)</option>
			<option value="riff">RIFF</option>
			<option value="iff">IFF</option>
			<option value="xws">XGworks</option>
		</select> <b id="openFile">Open SMF/IFF/RIFF/SEAM</b>.
	</p>
	<div id="results" style="font-family:monospace;white-space:preserve;word-break:break-all;padding:6px 10px;background:#0007;color:#fff;font-size:14px;border:0 solid;border-radius:8px">No file was selected for viewing.</div>
	<script src ="../js/skelView.js"></script>
</body>
